<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BRO-GRID-BEAT</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050510' width='100' height='100' rx='20'/><path d='M25 50 Q25 30 40 30 L65 20 L65 80 L40 70 Q25 70 25 50 Z' fill='%2300f5ff'/><rect x='70' y='35' width='8' height='30' rx='4' fill='%23ff00aa'/><circle cx='85' cy='50' r='5' fill='%23f0ff00'/></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    
    <div class="sequencer-container">
        <div class="header">
            <h1>BRO-GRID-BEAT</h1>
            <div class="subtitle">// rhythm sequencer //</div>
        </div>

        <div class="visualizer-container">
            <canvas id="spectrumCanvas"></canvas>
            <div class="visualizer-glow"></div>
        </div>

        <div class="notification" id="notification"></div>

        <div class="master-section">
            <div class="master-header">
                <div class="master-title">◈ MASTER CONTROLS</div>
            </div>
            <div class="master-container">
                <div class="slider-control" style="--slider-color: #00ff88; --slider-color-light: #00ffaa; --slider-glow: rgba(0, 255, 136, 0.5);">
                    <div class="slider-label">MASTER</div>
                    <div class="slider-track">
                        <div class="slider-fill" id="masterFill"></div>
                        <div class="slider-thumb" id="masterThumb"></div>
                        <input type="range" class="slider-input" id="masterVolume" min="0" max="100" value="80">
                    </div>
                    <div class="slider-value" id="masterVolumeValue">80%</div>
                </div>
                
                <div class="slider-control" style="--slider-color: #ff6600; --slider-color-light: #ff8844; --slider-glow: rgba(255, 102, 0, 0.5);">
                    <div class="slider-label">BASS</div>
                    <div class="slider-track">
                        <div class="slider-fill" id="bassFill"></div>
                        <div class="slider-thumb" id="bassThumb"></div>
                        <input type="range" class="slider-input" id="bassBoost" min="-12" max="12" value="0">
                    </div>
                    <div class="slider-value" id="bassBoostValue">0 dB</div>
                </div>
                
                <div class="slider-control" style="--slider-color: #00f5ff; --slider-color-light: #44ffff; --slider-glow: rgba(0, 245, 255, 0.5);">
                    <div class="slider-label">COMP</div>
                    <div class="slider-track">
                        <div class="slider-fill" id="compFill"></div>
                        <div class="slider-thumb" id="compThumb"></div>
                        <input type="range" class="slider-input" id="compressor" min="0" max="100" value="0">
                    </div>
                    <div class="slider-value" id="compressorValue">OFF</div>
                </div>
            </div>
        </div>

        <div class="preset-section">
            <div class="preset-header">
                <div class="preset-title">◈ BEAT PRESETS</div>
                <button class="preset-btn-small" id="helpBtn">❓ HELP</button>
            </div>
            <div class="preset-grid" id="presetGrid"></div>
        </div>

        <div class="help-modal" id="helpModal">
            <div class="help-content">
                <div class="help-header">
                    <div class="help-title">🎯 HOW TO USE</div>
                    <button class="help-close" id="helpClose">×</button>
                </div>
                <div id="helpTooltip"></div>
            </div>
        </div>

        <div class="mixer-section">
            <div class="mixer-header">
                <div class="mixer-title">◈ MIXER</div>
                <button class="toggle-btn" id="mixerToggleBtn">▲ HIDE</button>
            </div>
            <div class="channels-container" id="mixerChannels"></div>
        </div>

        <div class="effects-section">
            <div class="effects-header">
                <div class="effects-title">◈ EFFECTS</div>
                <button class="toggle-btn" id="effectsToggleBtn">▲ HIDE</button>
            </div>
            <div class="effects-container">
                <div class="effect-unit">
                    <div class="effect-name">
                        REVERB
                        <div class="effect-toggle" id="reverb-toggle"></div>
                    </div>
                    <div id="reverb-params"></div>
                </div>
                <div class="effect-unit">
                    <div class="effect-name">
                        DELAY
                        <div class="effect-toggle" id="delay-toggle"></div>
                    </div>
                    <div id="delay-params"></div>
                </div>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="step-numbers" id="stepNumbers"></div>
            <div class="step-grid-wrapper">
                <div class="track-labels" id="trackLabels"></div>
                <div id="grid" class="step-grid"></div>
            </div>
        </div>

        <div class="controls">
            <button id="playBtn" class="play-btn">▶ PLAY</button>
            <button id="stopBtn" class="stop-btn">◼ STOP</button>
            <button id="clearBtn" class="clear-btn">✕ CLEAR</button>
            <button id="mixerToggleBtn" class="mixer-btn">◈ MIXER</button>
            <button id="effectsToggleBtn" class="fx-btn">◈ FX</button>
            <div class="bpm-control">
                <label>BPM</label>
                <input type="number" id="bpmInput" value="128" step="5" min="60" max="200">
            </div>
        </div>

        <div class="beat-indicator" id="beatIndicator"></div>

        <footer>v1.2 // seevaa57@gmail.com</footer>
    </div>

    <div class="sound-picker-modal" id="soundPickerModal">
        <div class="sound-picker-content">
            <div class="sound-picker-header">
                <div class="sound-picker-title">🎵 SELECT SOUND</div>
                <button class="sound-picker-close" id="soundPickerClose">×</button>
            </div>
            <div id="soundPickerContent"></div>
        </div>
    </div>

    <script src="js/sounds.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
